version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - errcheck
    - errorlint
    - gosec
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - bodyclose
          - errcheck
          - gosec
